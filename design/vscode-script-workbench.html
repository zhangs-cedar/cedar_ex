<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CedarEx 工具台交互设计图</title>
  <link rel="stylesheet" href="workbench.css" />
</head>

<body>
  <div class="workbench" data-workbench>
    <header class="titlebar" aria-label="窗口栏">
      <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </header>

    <div class="shell" data-shell>
      <aside class="explorer" aria-label="资源管理器">
        <div class="explorer__title">资源管理器</div>
        <input class="explorer__search" data-search placeholder="搜索工具..." />
        <div class="explorer__meta"><span data-tool-count>18 个工具</span><button type="button">刷新</button></div>
        <nav class="tree" aria-label="工具树" data-tool-tree></nav>
      </aside>

      <div class="splitter splitter--vertical" data-resize="explorer" title="拖拽调整左侧宽度"></div>

      <main class="main-panel" data-main-panel>
        <div class="tabs" role="tablist">
          <button class="tab is-active" data-view-tab="form" type="button">填写信息</button>
          <button class="tab" data-view-tab="readme" type="button">使用说明</button>
        </div>

        <section class="content-panel">
          <section class="editor" aria-label="中心内容">
            <div class="view is-active" data-view="form">
              <div class="form-grid">
                <div class="field field--full">
                  <label><span>请选择要处理的文件夹 *</span><span>必填</span></label>
                  <div class="path-row"><input class="input is-placeholder" data-folder-input value="请选择文件夹" /><button
                      class="button" data-choose-folder type="button">选择文件夹</button></div>
                  <div class="hint">只需要选择文件夹，不需要输入命令。</div>
                </div>
                <div class="field"><label><span>处理方式</span><span>推荐默认</span></label><select class="input" data-mode>
                    <option>完整检查</option>
                    <option>只检查数量</option>
                    <option>只检查尺寸</option>
                  </select></div>
                <div class="field"><label><span>处理速度</span><span>推荐自动</span></label><select class="input">
                    <option>自动</option>
                    <option>较慢但更稳</option>
                  </select></div>
                <div class="field field--full"><label><span>报告保存位置</span><span>自动生成</span></label><input class="input"
                    value="自动保存到：输出报告文件夹" /></div>
              </div>
            </div>

            <div class="view markdown" data-view="readme">
              <h2 data-doc-title>README.md 使用说明</h2>
              <p data-doc-text>这里展示当前工具目录下真实 README.md 的解析结果。切换左侧工具后，这里的内容会随工具变化。</p>
              <div class="doc-card"><b>真实来源</b>
                <p>系统读取当前工具目录中的 README.md，并把内容渲染到这里。</p>
              </div>
            </div>
          </section>
        </section>

        <div class="splitter splitter--horizontal" data-resize="log" title="拖拽调整执行过程高度"></div>

        <section class="log-panel" aria-label="执行过程">
          <div class="log-toolbar"><b>执行过程</b>
            <div class="log-actions"><span data-log-state>等待开始。</span><button class="button button--primary" data-run
                type="button">运行</button><button class="button button--danger" data-stop type="button">停止</button></div>
          </div>
          <pre class="log-output" data-log>提示：选择工具，填写信息，然后点击底部“运行”。</pre>
        </section>
      </main>
    </div>

    <footer class="statusbar"><span>CedarEx 工具台</span><span>就绪</span></footer>
  </div>
  <script src="workbench.js"></script>
</body>

</html>
