<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CedarEx 工具台</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="vscode-shell">
      <header class="titlebar">
        <div class="window-dots"><span></span><span></span><span></span></div>
      </header>

      <div class="main-layout">
        <aside class="sidebar">
          <div id="sideTitle" class="side-title">资源管理器</div>
          <label class="search-box" aria-label="搜索工具">
            <span>⌕</span>
            <input id="scriptSearch" placeholder="搜索工具..." autocomplete="off" />
          </label>
          <div class="sidebar-meta">
            <span id="scriptCount">0 个工具</span>
            <button id="refreshBtn" class="text-button">刷新</button>
          </div>
          <nav id="scriptTree" class="script-tree" aria-label="工具列表"></nav>
          <div id="sidePanel" class="side-panel hidden"></div>
        </aside>

        <main class="workspace">
          <div class="tabs">
            <button class="tab active" data-editor-tab="form">填写信息</button>
            <button class="tab" data-editor-tab="readme">使用说明</button>
          </div>

          <section class="editor-area">
            <section class="editor-pane">
              <section id="emptyState" class="empty-state">
                <div class="empty-icon">▶</div>
                <h3>选择工具，填写信息，然后开始</h3>
                <p>不需要输入命令。填写完成后，点击底部“运行”。</p>
              </section>

              <section id="taskPanel" class="task-panel hidden">
                <article class="card form-card">
                  <div class="card-header">
                    <div>
                      <h3>填写信息</h3>
                      <p class="muted">按提示填写即可，不需要了解代码或命令。</p>
                    </div>
                  </div>
                  <form id="configForm" class="form"></form>
                </article>
              </section>

              <section id="readmePanel" class="readme-panel hidden">
                <article class="card doc-card">
                  <div class="card-header compact">
                    <div>
                      <h3>使用说明</h3>
                      <p class="muted">解析当前工具目录下真实 README.md。</p>
                    </div>
                    <button id="toggleDocBtn" class="text-button">收起</button>
                  </div>
                  <div id="doc" class="doc markdown-body">暂无说明文档。</div>
                </article>
              </section>
            </section>

            <aside class="assistant-pane">
              <div class="assistant-title">智能助手</div>
              <article class="card ai-card">
                <h3>现在可以做什么</h3>
                <p class="muted">先选择一个工具，再填写必要信息。不确定用途时打开“使用说明”。</p>
              </article>
              <article id="aiReviewPanel" class="card ai-review-card hidden">
                <div class="card-header compact"><div><h3>智能建议</h3><p class="muted">基于填写信息和执行记录给出建议。</p></div></div>
                <div id="aiReview" class="doc markdown-body">暂无建议。</div>
              </article>
              <article class="card ai-card">
                <h3>一键帮我</h3>
                <div class="quick-actions">
                  <button type="button" data-ai-action="explain_params">解释当前设置</button>
                  <button type="button" data-ai-action="generate_command">推荐处理方式</button>
                  <button type="button" data-ai-action="diagnose_log">查看问题原因</button>
                  <button type="button" data-ai-action="create_template">生成新工具模板</button>
                </div>
              </article>
              <article class="card ai-card">
                <h3>运行前确认</h3>
                <p id="precheckText" class="muted">请选择工具并填写必填信息。</p>
              </article>
            </aside>
          </section>

          <section class="terminal-panel">
            <div class="panel-tabs">
              <b>执行过程</b>
              <span id="logHint" class="terminal-hint">等待开始。</span>
              <div class="actions terminal-actions">
                <button id="runBtn" class="primary">运行</button>
                <button id="stopBtn" class="danger">停止</button>
              </div>
            </div>
            <div class="terminal-window">
              <div id="terminal" class="xterm-host"></div>
            </div>
          </section>
        </main>
      </div>

      <footer class="statusbar"><span>CedarEx 工具台</span><span>智能助手已就绪</span></footer>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="vendor/mermaid.min.js"></script>
    <script src="vendor/xterm.js"></script>
    <script src="app.js"></script>
  </body>
</html>
