<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CedarEx</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <h1>CedarEx</h1>
            <p>本地脚本工作台</p>
          </div>
        </div>

        <label class="search-box" aria-label="搜索脚本">
          <span>⌕</span>
          <input id="scriptSearch" placeholder="搜索脚本名称..." autocomplete="off" />
        </label>

        <div class="sidebar-meta">
          <span id="scriptCount">0 个脚本</span>
          <button id="refreshBtn" class="text-button">刷新</button>
        </div>
        <nav id="scriptTree" class="script-tree" aria-label="脚本列表"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <div class="eyebrow">当前任务</div>
            <h2 id="scriptTitle">选择一个脚本开始</h2>
            <p id="scriptPath" class="muted">左侧选择脚本后，会自动生成参数表单。</p>
          </div>
          <div class="run-state" id="runState">空闲</div>
        </header>

        <section id="emptyState" class="empty-state">
          <div class="empty-icon">▶</div>
          <h3>选择脚本，填写参数，然后运行</h3>
          <p>界面会保留 Python 脚本执行能力，并在下方实时显示日志。</p>
        </section>

        <section id="taskPanel" class="task-grid hidden">
          <article class="card form-card">
            <div class="card-header">
              <div>
                <h3>参数配置</h3>
                <p class="muted">确认路径、数值和开关后再执行。</p>
              </div>
              <div class="actions">
                <button id="resetBtn" class="ghost">重置</button>
                <button id="runBtn" class="primary">运行脚本</button>
                <button id="stopBtn" class="danger">停止 / Ctrl+C</button>
              </div>
            </div>
            <form id="configForm" class="form"></form>
          </article>

          <article class="card doc-card">
            <div class="card-header compact">
              <h3>说明</h3>
              <button id="toggleDocBtn" class="text-button">收起</button>
            </div>
            <div id="doc" class="doc markdown-body">暂无说明文档。</div>
          </article>
        </section>

        <section class="card log-card terminal-card">
          <div class="card-header compact">
            <div>
              <h3>Terminal</h3>
              <p id="logHint" class="muted">等待命令执行。</p>
            </div>
            <div class="actions">
              <button id="analyzeBtn" class="ghost" disabled>让 opencode 分析</button>
              <button id="copyLogBtn" class="ghost">复制日志</button>
              <button id="clearLogBtn" class="ghost">清空</button>
            </div>
          </div>
          <div class="terminal-window">
            <div class="terminal-titlebar">
              <div class="traffic-lights" aria-hidden="true">
                <span class="red"></span>
                <span class="yellow"></span>
                <span class="green"></span>
              </div>
              <div id="terminalTitle" class="terminal-title">cedarex — idle</div>
              <div class="terminal-badge">local</div>
            </div>
            <div id="terminal" class="xterm-host"></div>
          </div>
        </section>

        <section id="aiReviewPanel" class="card ai-review-card hidden">
          <div class="card-header compact">
            <div>
              <h3>AI Review</h3>
              <p class="muted">opencode 会基于退出码、参数和日志判断本次运行情况。</p>
            </div>
          </div>
          <div id="aiReview" class="doc markdown-body">暂无分析结果。</div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="vendor/mermaid.min.js"></script>
    <script src="vendor/xterm.js"></script>
    <script src="app.js"></script>
  </body>
</html>
